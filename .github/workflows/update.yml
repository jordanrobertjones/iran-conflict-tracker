name: Daily Iran Conflict Update

on:
  # Runs at 4:00 AM Mountain Time (10:00 UTC during MDT/summer, 11:00 UTC during MST/winter)
  schedule:
    - cron: '0 10 * * *'

  # Allows manual "Update Now" trigger from the GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update.py

      - name: Commit and push changes
        run: |
          git config --global user.name  "Iran Conflict Bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Daily update $(date -u +'%Y-%m-%d')"
          git push
