<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iran Conflict Tracker — History</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Georgia', serif; background: #f5f4f0; color: #2c2c2c; }
    header {
      background: #1a1a2e; color: #fff;
      padding: 32px 24px; text-align: center;
    }
    header h1 { font-size: 1.5rem; margin-bottom: 6px; }
    header p { font-size: 0.9rem; color: #b0afc0; font-style: italic; }
    .back-link {
      display: inline-block; margin: 24px 24px 0;
      font-family: sans-serif; font-size: 0.85rem;
      color: #3949ab; text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
    main { max-width: 700px; margin: 24px auto; padding: 0 20px 60px; }
    .snapshot-list { list-style: none; }
    .snapshot-list li {
      background: #fff;
      border-radius: 8px;
      margin-bottom: 12px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.07);
    }
    .snapshot-list a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      text-decoration: none;
      color: #1a1a2e;
    }
    .snapshot-list a:hover { background: #f0f0f8; border-radius: 8px; }
    .snap-date { font-weight: 700; font-size: 1rem; }
    .snap-label { font-size: 0.82rem; color: #888; font-family: sans-serif; }
    .snap-arrow { color: #3949ab; font-size: 1.1rem; }
    .empty {
      text-align: center; color: #888; font-style: italic;
      padding: 40px 0; font-family: sans-serif; font-size: 0.9rem;
    }
  </style>
</head>
<body>
<header>
  <h1>📅 Historical Snapshots</h1>
  <p>Each entry reflects how the conflict appeared on that date</p>
</header>

<a class="back-link" href="../index.html">← Back to Current View</a>

<main>
  <ul class="snapshot-list" id="snapshot-list">
    <!-- SNAPSHOT_ENTRIES -->
  </ul>
  <p class="empty" id="empty-msg" style="display:none;">No snapshots yet. Check back after the first daily update.</p>
</main>

<script>
  const list = document.getElementById('snapshot-list');
  const empty = document.getElementById('empty-msg');
  if (!list.children.length) empty.style.display = 'block';
</script>
</body>
</html>
